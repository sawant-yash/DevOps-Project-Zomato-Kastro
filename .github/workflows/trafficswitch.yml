name: Zomato CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_version:
        description: "Enter image version"
        required: false

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Version
      id: version
      run: |
        if [ -z "${{ github.event.inputs.image_version }}" ]; then
          VERSION=${{ github.run_number }}
        else
          VERSION=${{ github.event.inputs.image_version }}
        fi

        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/zomato:$VERSION .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/zomato:$VERSION

    - name: Replace Version in Deployment File
      run: |
        sed -i "s/VERSION/$VERSION/g" k8s/deployment.yaml
        sed -i "s/YOUR_DOCKERHUB_USERNAME/${{ secrets.DOCKER_USERNAME }}/g" k8s/deployment.yaml

    - name: Configure Kubectl
      uses: azure/setup-kubectl@v4

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
