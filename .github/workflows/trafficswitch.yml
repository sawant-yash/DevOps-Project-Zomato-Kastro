name: Zomato CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_version:
        description: "Enter image version"
        required: false

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Version
      id: version
      run: |
        if [ -z "${{ github.event.inputs.image_version }}" ]; then
          VERSION=${{ github.run_number }}
        else
          VERSION=${{ github.event.inputs.image_version }}
        fi

        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/zomato:$VERSION .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/zomato:$VERSION

    - name: Replace Version in Deployment File
      run: |
        sed -i "s/VERSION/$VERSION/g" Kubernetes/deployment.yaml
        sed -i "s/yash5030/${{ secrets.DOCKERHUB_USERNAME }}/g" Kubernetes/deployment.yaml

    - name: Create Kind Cluster
      uses: helm/kind-action@v1

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    - name: Check cluster
      run: |
        kubectl get nodes
        
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f Kubernetes/deployment.yaml
        kubectl apply -f Kubernetes/service.yaml
